# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# The napi crate brings a large transitive tree (node-api, SIMD crates) with
# exotic licenses that aren't interesting for supply-chain audit. Exclude it
# from the license/advisory graph here; security audit runs against the
# napi crate separately.
[graph]
exclude = ["spaghetti-napi"]

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
