name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      # Run BOTH the SDK and CLI suites (test:packages). The `@vibecook/spaghetti`
      # filter alone matched only the CLI. The SDK suite needs the built native
      # addon + better-sqlite3, both present here: `pnpm build` above ran
      # `pnpm -r build` (which builds the native crate) and better-sqlite3 is a
      # root devDependency installed by the frozen-lockfile step.
      #
      # Windows runs only the CLI suite for now: the SDK suite has ~21
      # pre-existing Windows-only failures (path-separator assumptions in
      # tests and codex/grok path handling) — tracked in the "SDK test suite
      # fails on Windows" issue. Remove the split once that lands.
      - name: Test
        if: matrix.os != 'windows-latest'
        run: pnpm test:packages
      - name: Test (CLI only)
        if: matrix.os == 'windows-latest'
        run: pnpm --filter @vibecook/spaghetti test
      - name: Ingest diff (small fixture)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm test:ingest-diff
      - name: Ingest diff (medium fixture)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm test:ingest-diff:medium
      - name: Ingest diff (Grok small fixture)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm test:ingest-diff:grok
      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: pnpm lint
      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run format:check

  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- --deny warnings
      - name: cargo test
        run: cargo test --workspace
